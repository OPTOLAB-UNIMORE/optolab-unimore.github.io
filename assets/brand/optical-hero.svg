<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 680" role="img" aria-labelledby="title desc">
  <title id="title">Abstract optical measurement illustration</title>
  <desc id="desc">Colored light paths pass through circular optical elements and converge on a detector grid.</desc>
  <defs>
    <linearGradient id="beamA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#27b8c3"/>
      <stop offset=".5" stop-color="#7755a6"/>
      <stop offset="1" stop-color="#bf4f88"/>
    </linearGradient>
    <linearGradient id="beamB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#54c8c6"/>
      <stop offset="1" stop-color="#e88545"/>
    </linearGradient>
    <radialGradient id="lens">
      <stop offset="0" stop-color="#e9fbfa" stop-opacity=".88"/>
      <stop offset=".72" stop-color="#9fdbdf" stop-opacity=".25"/>
      <stop offset="1" stop-color="#137b8a" stop-opacity=".5"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="760" height="680" rx="48" fill="#f4f9f9"/>
  <circle cx="378" cy="338" r="214" fill="none" stroke="#d5e6e8" stroke-width="1"/>
  <circle cx="378" cy="338" r="274" fill="none" stroke="#e2ecee" stroke-width="1" stroke-dasharray="6 12"/>
  <path d="M55 194 L296 303 L530 259 L701 216" fill="none" stroke="url(#beamA)" stroke-width="28" stroke-linecap="round" opacity=".12" filter="url(#glow)"/>
  <path d="M55 194 L296 303 L530 259 L701 216" fill="none" stroke="url(#beamA)" stroke-width="7" stroke-linecap="round"/>
  <path d="M55 338 L296 338 L530 338 L701 338" fill="none" stroke="url(#beamB)" stroke-width="24" stroke-linecap="round" opacity=".11" filter="url(#glow)"/>
  <path d="M55 338 L296 338 L530 338 L701 338" fill="none" stroke="url(#beamB)" stroke-width="6" stroke-linecap="round"/>
  <path d="M55 482 L296 373 L530 417 L701 460" fill="none" stroke="url(#beamA)" stroke-width="28" stroke-linecap="round" opacity=".12" filter="url(#glow)"/>
  <path d="M55 482 L296 373 L530 417 L701 460" fill="none" stroke="url(#beamA)" stroke-width="7" stroke-linecap="round"/>
  <ellipse cx="296" cy="338" rx="44" ry="133" fill="url(#lens)" stroke="#167e8b" stroke-width="2"/>
  <ellipse cx="530" cy="338" rx="35" ry="115" fill="url(#lens)" stroke="#7755a6" stroke-width="2"/>
