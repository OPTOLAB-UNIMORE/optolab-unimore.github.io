project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "projects/**/*.qmd"
  resources:
    - ".nojekyll"

website:
  title: "OptoLAB"
  description: "Optical technologies for biomedical imaging, sensing and ophthalmic instrumentation."
  site-url: "https://optolab-unimore.github.io/"
  favicon: assets/brand/favicon.svg
  search:
    location: navbar
    type: overlay
  page-navigation: true
  back-to-top-navigation: true
  open-graph:
    title: "OptoLAB | Biomedical Optics and Optoelectronic Instrumentation"
    description: "Optical technologies for biomedical imaging, sensing and ophthalmic instrumentation."
    image: assets/brand/optical-hero.svg
    locale: en_US
  twitter-card:
    title: "OptoLAB"
    description: "Optical technologies for biomedical imaging, sensing and ophthalmic instrumentation."
    image: assets/brand/optical-hero.svg
    card-style: summary_large_image
  repo-url: "https://github.com/OPTOLAB-UNIMORE/optolab-unimore.github.io"
  repo-actions: [source]
  navbar:
    background: light
    pinned: true
    logo: assets/brand/favicon.svg
    logo-alt: "OptoLAB abstract spectrum mark"
    title: "OptoLAB"
    left:
      - href: index.qmd
        text: Home
      - href: research.qmd
        text: Research
      - href: projects/index.qmd
        text: Projects
      - href: publications.qmd
        text: Publications
      - href: software.qmd
        text: Software
      - href: facilities.qmd
        text: Facilities
      - href: team.qmd
        text: Team
      - href: contact.qmd
        text: Contact
    right:
      - icon: github
        href: https://github.com/OPTOLAB-UNIMORE
        aria-label: "OptoLAB on GitHub"
  page-footer:
    border: true
    left: |
      **OptoLAB** · University of Modena and Reggio Emilia
    center: |
      Biomedical optics and optoelectronic instrumentation
    right: |
      [GitHub organization](https://github.com/OPTOLAB-UNIMORE)

format:
  html:
    theme:
      - cosmo
      - styles.scss
    toc: true
    anchor-sections: true
    smooth-scroll: true
    link-external-newwindow: true
    lang: en

execute:
  freeze: auto
